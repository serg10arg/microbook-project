server:
  port: 8761

spring:
  application:
    name: service-registry

eureka:
  instance:
    hostname: localhost
  client:
    # Un servidor Eureka no se registra a sí mismo ni busca peers
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Desactiva la protección de evicción en desarrollo (standalone mode)
    enable-self-preservation: false